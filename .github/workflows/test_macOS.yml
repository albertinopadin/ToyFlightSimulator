name: ToyFlightSimulator macOS Tests > main

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test macOS App ToyFlightSimulator
    runs-on: macos-26
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Verify Xcode version
        run: xcodebuild -version

      - name: Verify Swift version
        run: swift --version

      - name: Run tests
        # `-parallel-testing-enabled NO` runs all suites in a single test
        # host. xcodebuild's default parallel mode dispatches Swift Testing
        # via a placeholder ID and can leave the storyboard-loaded
        # NSApplication run loop alive after tests finish (the
        # FlightboxWithPhysics starting scene keeps rendering at 60 fps),
        # which blocks the runner from exiting. Serial mode avoids that
        # and still completes the full suite in ~12 s locally.
        run: |
          set -o pipefail
          xcodebuild test \
            -project ToyFlightSimulator.xcodeproj \
            -scheme "ToyFlightSimulator macOS" \
            -sdk macosx \
            -configuration Debug \
            -parallel-testing-enabled NO \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify --renderer github-actions

      - name: Upload xcresult on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: TestResults.xcresult
          path: TestResults.xcresult
